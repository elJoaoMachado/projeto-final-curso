# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci --legacy-peer-deps
      - run: CI=false npm run build
      - name: Deploy PR preview to Firebase Hosting
        if: ${{ secrets.FIREBASE_TOKEN != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseToken: ${{ secrets.FIREBASE_TOKEN }}
          projectId: projetofinal-f4f26
      - name: Skip deploy when token is missing
        if: ${{ secrets.FIREBASE_TOKEN == '' }}
        run: echo "FIREBASE_TOKEN is not configured. Build succeeded and preview deploy was skipped."
